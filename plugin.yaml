name: napcat-platform
label: QQ (NapCat)
kind: platform
version: 0.3.0
description: >
  QQ messaging adapter for Hermes Agent based on NapCat's OneBot 11
  reverse WebSocket protocol. Hermes hosts a reverse WS server that
  NapCat connects to for inbound events, and calls NapCat's HTTP API
  for outbound messages.
  Features: Markdown→QQ plain-text conversion, admin permission system,
  local file sending (file://), 40+ QQ control tools, media handling,
  and full group management.
author: shubyi / Hermes Community
requires_env:
  - name: NAPCAT_HTTP_API
    description: "NapCat HTTP API base URL (e.g. http://127.0.0.1:18801)"
    prompt: "NapCat HTTP API URL"
    password: false
optional_env:
  - name: NAPCAT_WS_PORT
    description: "Reverse WebSocket server port (default: 18800)"
    prompt: "Reverse WS port"
    password: false
  - name: NAPCAT_ACCESS_TOKEN
    description: "Access token for OneBot 11 API + WS authentication"
    prompt: "Access token"
    password: true
  - name: NAPCAT_SELF_ID
    description: "Bot QQ number (auto-detected from HTTP probe if blank)"
    prompt: "Bot QQ number"
    password: false
  - name: NAPCAT_DM_POLICY
    description: "DM policy: allowlist | open | disabled (default: allowlist)"
    prompt: "DM policy"
    password: false
  - name: NAPCAT_ALLOW_FROM
    description: "Comma-separated QQ numbers allowed to DM the bot"
    prompt: "Allowed QQ numbers"
    password: false
  - name: NAPCAT_GROUP_POLICY
    description: "Group policy: open | allowlist | disabled (default: open)"
    prompt: "Group policy"
    password: false
  - name: NAPCAT_GROUP_ALLOW_FROM
    description: "Comma-separated group IDs allowed (falls back to DM allowlist)"
    prompt: "Allowed group IDs"
    password: false
  - name: NAPCAT_ADMINS
    description: "Comma-separated QQ numbers with admin rights"
    prompt: "Admin QQ numbers"
    password: false
  - name: NAPCAT_MEDIA_MAX_MB
    description: "Max media file size in MB (default: 5)"
    prompt: "Max media size"
    password: false
